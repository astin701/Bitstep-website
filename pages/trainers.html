<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Expert Trainers | Bitstep Academy</title>

        <!-- ICON -->
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

        <link rel="icon" type="image/png" href="../images/Bitstep_tab-logo_.png">
        <link rel="stylesheet" href="../CSS/Trainers.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    </head>
    <body>

        <nav>
            <div>
                <div class="back-btn"><a href="../index.html" class="active"><i class='bx bx-arrow-back' ></i></a></div>
                <div class="logo"><img src="../images/Bitstep_logo.png" alt="Bitstep Logo"></div>
            </div>
            <ul id="navbar">
                <li><a href="#training" class="active">Our Training</a></li>
                <li><a href="#Team">Our Team</a></li>
            </ul>
            <div id="menu-btn">☰</div>
        </nav>

        <section id="training">
            <div class="containner">
                <div class="containner-top">
                    
                </div>
            </div>
        </section>

        <section id="team">
            ...
        </section>

        <script>

            // ======================================
            // MOBILE MENU
            // ======================================

            const menuBtn = document.getElementById("menu-btn");
            const navbar = document.getElementById("navbar");

            menuBtn.addEventListener("click", () => {
                navbar.classList.toggle("active");

                if (navbar.classList.contains("active")) {
                    menuBtn.innerHTML = "✕";
                } else {
                    menuBtn.innerHTML = "☰";
                }
            });

            // ======================================
            // CLOSE MENU WHEN LINK IS CLICKED
            // ======================================

            document.querySelectorAll("#navbar a").forEach(link => {

                link.addEventListener("click", () => {

                    navbar.classList.remove("active");
                    menuBtn.innerHTML = "☰";

                });

            });

            const sections = document.querySelectorAll("section");
            const navLinks = document.querySelectorAll("nav ul li a");

            window.addEventListener("scroll", () =>{

                let current = "";

                sections.forEach(section => {

                    const sectionTop = section.offsetTop - 120;
                    const sectionHeight = section.clientHeight;

                    if (window.scrollY >= sectionTop) {
                        current = section.getAttribute("id");
                    }

                });

                navLinks.forEach(link => {
                    
                    link.classList.remove("active");

                    if (link.getAttribute("href") === "#" + current) {
                        link.classList.add("active");
                    }
                })
            })

            // ======================================
            // SCROLL TO TOP BUTTON
            // ======================================

            const scrollBtn = document.createElement("div");

            scrollBtn.className = "scroll-top";
            scrollBtn.innerHTML = "↑";

            document.body.appendChild(scrollBtn);

            window.addEventListener("scroll", () => {

                if (window.scrollY > 500) {

                    scrollBtn.classList.add("show");

                } else {

                    scrollBtn.classList.remove("show");

                }

            });

            scrollBtn.addEventListener("click", () => {

                window.scrollTo({

                    top:0,
                    behavior:"smooth"

                });

            });
        </script>
        
    </body>
</html>
